name: ubuntu

on:
  workflow_dispatch:
  push:
    paths:
      - '**'
      - '!.github/**'
      - '.github/workflows/ubuntu.yml'
      - '!**.md'
  pull_request:
    paths:
      - '**'
      - '!.github/**'
      - '.github/workflows/ubuntu.yml'
      - '!**.md'

jobs:
  linux:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        wx-version: ['v3.2.8.1']
        options: ['', '-DBUILD_WXTERMINAL_DEMO=OFF']

    steps:

    # wxWidgets
    - name: Install dependencies for wxWidgets
      run: |
        sudo apt-get update
        sudo apt-get install build-essential cmake gettext git libedit-dev libgtk-3-dev libhunspell-dev libsqlite3-dev libssh-dev pkg-config xterm libmariadb-dev libpq-dev

    - name: Checkout WxWidgets
      uses: actions/checkout@v6
      with:
        repository: wxWidgets/wxWidgets
        ref: ${{matrix.wx-version}}
        submodules: recursive
        path: wxWidgets

    - name: Build and install wxWidgets
      run: |
        mkdir -p wxWidgets/build-release
        cd wxWidgets/build-release
        ../configure --disable-debug_flag --with-gtk=3 --enable-stl
        make -j$(nproc) && sudo make install
        echo LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib >> $GITHUB_ENV

    # wxTerminalEmulator
    - name: Checkout wxTerminalEmulator
      uses: actions/checkout@v6

    - name: cmake --version
      run: cmake --version

    - name: Build
      run: |
        mkdir build-release
        cd build-release
        cmake .. -DCMAKE_BUILD_TYPE=Release ${{ matrix.options }}
        cmake --build . --config Release --parallel $(nproc)
